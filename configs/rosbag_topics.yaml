# rosbag_topics.yaml
# Configuration for scripts/extract_rosbag.py
#
# Before extracting, inspect your bag to confirm topic names:
#   ros2 bag info <path/to/bag>
#
# Common differences across robot setups:
#   - Camera: compressed vs raw, different namespace prefixes
#   - GPS: NavSatFix may be under /gps, /fix, or /navsat/fix
#   - IMU: Microstrain vs VectorNav vs generic /imu/data
#   - Odometry: raw wheel odom vs EKF-fused /odometry/filtered
#
# Adjust the values below to match your specific bag contents.

# ---------------------------------------------------------------------------
# topics — ROS2 topic names to extract from the bag
# ---------------------------------------------------------------------------
topics:

  # --- Front camera (primary observation) ---
  # Insta360 X2/X3 front fisheye lens.
  # If the bag was recorded with /fisheye/dual/image/compressed (recommended),
  # set dual_camera instead and leave front_camera / rear_camera unset.
  front_camera: "/fisheye/front/image"
  # Alternatives:
  #   front_camera: "/fisheye/front/image/compressed"  # Insta360 compressed
  #   front_camera: "/camera_front/color/image_raw"    # RealSense D435
  #   front_camera: "/camera/color/image_raw"          # generic single-camera

  # --- Rear camera (supplemental observation) ---
  rear_camera: "/fisheye/back/image"
  # Alternatives:
  #   rear_camera: "/fisheye/back/image/compressed"    # Insta360 compressed
  #   rear_camera: "/camera_rear/color/image_raw"      # RealSense rear

  # --- Dual fisheye (alternative to separate front/rear) ---
  # When the bag contains the dual compressed stream, set dual_camera and
  # leave front_camera / rear_camera commented out.  The extractor will split
  # the image at the horizontal midpoint: left half → obs_0 (front),
  # right half → obs_3 (rear).
  #
  # dual_camera: "/fisheye/dual/image/compressed"

  # --- GPS / GNSS fix ---
  # Clearpath J100 (namespace j100_0519) GPS fix.
  gps: "/j100_0519/sensors/gps_0/fix"
  # Alternatives:
  #   gps: "/navsat/fix"               # generic NavSatFix
  #   gps: "/fix"                      # GPSd bridge
  #   gps: "/gps/fix"                  # older Jackal with UM7 GPS

  # --- GPS heading ---
  # Clearpath J100 compass heading as QuaternionStamped.
  # Used when heading_source is "gps_heading" (see sync section below).
  gps_heading: "/j100_0519/sensors/gps_0/heading"
  # Alternatives:
  #   gps_heading: ""   # leave empty to disable; fall back to "imu" or "gps"

  # --- IMU ---
  # Jackal J100 IMU — on the robot base, aligned with robot body frame.
  # Used as heading fallback when heading_source is "imu".
  imu: "/j100_0519/sensors/imu_0/data"
  # Alternatives:
  #   imu: "/imu/data"                 # Insta360 madgwick (camera frame — not recommended for heading)
  #   imu: "/microstrain/imu/data"     # Microstrain GX5 (some Jackals)

  # --- Wheel odometry (optional) ---
  # J100 does not expose an EKF-fused odometry topic by default.
  # Uncomment if your setup publishes one.
  #
  # odom: "/j100_0519/odometry/filtered"

# ---------------------------------------------------------------------------
# sync — Time synchronization policy
# ---------------------------------------------------------------------------
sync:

  # Target camera frame rate (Hz). Used to enforce uniform temporal spacing
  # when sub-sampling frames from the bag.
  camera_hz: 10.0

  # Time window (seconds) for selecting past observation frames relative to
  # the current frame. With camera_hz=10 and past_dt_s=0.5, the two past
  # frames are drawn from t-0.25s and t-0.5s (or nearest available).
  past_dt_s: 0.5

  # Maximum allowed time difference (seconds) between a camera timestamp and
  # the nearest GPS fix. Frames with no GPS fix within this window are dropped.
  gps_tol_s: 0.5

  # Maximum allowed time difference (seconds) between a camera timestamp and
  # the nearest IMU message. Used for heading extraction when heading_source
  # is set to "imu".
  imu_tol_s: 0.1

  # Minimum robot speed (m/s) required to include a frame in the dataset.
  # Frames captured while the robot is stationary are excluded to avoid
  # training on uninformative samples with near-zero waypoint displacement.
  min_speed_mps: 0.3

  # Source used to determine robot heading at each sampled frame.
  #   "gps_heading" — QuaternionStamped from the GPS heading topic (default for J100)
  #   "imu"         — orientation quaternion from sensor_msgs/Imu
  #   "gps"         — bearing from consecutive GPS fixes (noisy at low speed)
  #   "odom"        — yaw from odometry pose (requires odom topic)
  heading_source: "gps_heading"

# ---------------------------------------------------------------------------
# map — OSM tile rendering settings
# ---------------------------------------------------------------------------
map:

  # Tile server URL template. {z}/{x}/{y} will be substituted at render time.
  # CartoDB Positron No Labels — clean, low-clutter base map, no text overlays
  # that would leak semantic information inconsistently.
  tile_url: "https://cartodb-basemaps-a.global.ssl.fastly.net/light_nolabels/{z}/{x}/{y}.png"
  # Alternatives:
  #   tile_url: "https://tile.openstreetmap.org/{z}/{x}/{y}.png"       # standard OSM (has labels)
  #   tile_url: "https://cartodb-basemaps-a.global.ssl.fastly.net/dark_nolabels/{z}/{x}/{y}.png"  # dark variant
  #   tile_url: "https://stamen-tiles.a.ssl.fastly.net/toner-lite/{z}/{x}/{y}.png"  # Stamen Toner Lite

  # Local directory for caching downloaded tiles. Prevents re-downloading
  # the same tile across multiple extraction runs on the same area.
  tile_cache: "/tmp/nomad_tile_cache"

  # OSM zoom level for tile fetching.
  # 17 → ~1.2m/pixel at the equator, covers ~300m radius at 512px.
  # Increase to 18 for finer detail (shorter routes); decrease to 16 for
  # longer routes covering more ground.
  tile_zoom: 18

  # Internal render resolution (pixels) before downsampling to output_size.
  # Rendering at 2× output_size then downsampling with anti-aliasing gives
  # sharper route overlays compared to rendering directly at output_size.
  render_size: 512

  # Final map image size (pixels, square) fed to the MapEncoder.
  # Must match model.map_image_size in the training config (default.yaml).
  output_size: 224

# ---------------------------------------------------------------------------
# data — Dataset extraction and labeling parameters
# ---------------------------------------------------------------------------
data:

  # Number of future waypoints to label per sample (prediction horizon H).
  # Must match model.prediction_horizon in default.yaml.
  horizon: 5

  # Maximum lookahead distance (meters) for waypoint sampling along the
  # GPS trajectory. Waypoints beyond this distance are clipped and normalized.
  # Must match data.max_waypoint_distance in default.yaml.
  max_wp_dist_m: 2.5

  # Desired arc-length spacing (meters) between consecutive waypoints along
  # the GPS path. Together with horizon and max_wp_dist_m this controls how
  # far ahead the model is trained to look:
  #   total_lookahead = horizon * wp_spacing_m  →  5 × 0.5m = 2.5m
  wp_spacing_m: 0.5

  # Observation image size (pixels, square) for front and rear camera crops.
  # Must match data.image_size in default.yaml.
  obs_size: 224

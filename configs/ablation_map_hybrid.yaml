# configs/ablation_map_hybrid.yaml
# Ablation: hybrid channel-separated map representation.
#
# Build the dataset with --map-mode hybrid, then train with this config.
# Compare against default.yaml (rgb mode) to measure the ablation effect.
#
# Usage:
#   python scripts/train.py --config-name ablation_map_hybrid

defaults:
  - default

data:
  map_mode: "hybrid"
  # Per-channel normalisation for the hybrid image:
  #   Ch R (OSM grayscale): similar distribution to ImageNet R channel
  #   Ch G (route mask):    sparse [0,1] signal, centred at 0.5
  #   Ch B (pos+goal):      sparse [0,1] signal, centred at 0.5
  map_normalize_mean: [0.45, 0.5, 0.5]
  map_normalize_std:  [0.22, 0.25, 0.25]

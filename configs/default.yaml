model:
  token_dim: 256                    # d — embedding dimension
  obs_context_length: 2             # K — number of past frames
  prediction_horizon: 5             # H — number of waypoints to predict

encoder:
  backbone: "efficientnet_b0"
  pretrained: true
  freeze_epochs: 5                  # freeze encoder for first N epochs

decoder:
  type: "cross_attention"           # "cross_attention" or "self_attention"
  n_layers: 4
  n_heads: 4
  d_ff: 512
  dropout: 0.1

action_head:
  type: "regression"                # "regression" or "diffusion" (future)
  hidden_dim: 128

loss:
  lambda_direction: 0.5
  lambda_progress: 0.1
  lambda_smooth: 0.01

training:
  batch_size: 32
  learning_rate: 1e-4
  weight_decay: 1e-4
  optimizer: "adamw"
  epochs: 100
  scheduler: "cosine"
  warmup_epochs: 5
  save_every: 10                    # save checkpoint every N epochs
  num_workers: 4                    # DataLoader worker processes
  use_wandb: false                  # enable wandb logging
  dummy: false                      # use DummydynavDataset instead of real data
  dummy_size: 100                   # number of dummy samples

data:
  data_dir: "data"                  # root directory for real datasets
  image_size: 224
  map_image_size: 224
  normalize_waypoints: true
  max_waypoint_distance: 2.5        # meters, for normalization

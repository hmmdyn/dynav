# @package _global_
# RTX 5090 training config — FrodoBots 31K dataset
# Usage: python scripts/train.py --config-name train_frodobots data.data_dir=/path/to/dataset

defaults:
  - default
  - _self_

training:
  batch_size: 128
  learning_rate: 2e-4
  weight_decay: 1e-4
  optimizer: "adamw"
  epochs: 50
  warmup_epochs: 5
  scheduler: "cosine"
  save_every: 5
  num_workers: 12
  use_wandb: true
  wandb_project: "dynav"
  wandb_entity: "YOUR_WANDB_ENTITY"    # wandb username or team name
  amp: true                         # BF16 autocast — Blackwell architecture
